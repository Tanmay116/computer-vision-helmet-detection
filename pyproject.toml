# Ruff — linter + formatter configuration
# https://docs.astral.sh/ruff/

[tool.ruff]
target-version = "py311"
line-length = 100
fix = true

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "ANN", # flake8-annotations (enforce type hints)
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "RET", # flake8-return
    "SLF", # flake8-self
    "PLW", # Pylint warnings
    "BLE", # flake8-blind-except
]
ignore = [
    "ANN101",  # Missing self type annotation
    "ANN102",  # Missing cls type annotation
    "ANN401",  # Allow `Any` where necessary (ML outputs)
]

[tool.ruff.lint.isort]
known-first-party = ["api", "core", "services"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# Pytest
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
